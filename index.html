    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        :root {
            --primary: #0a0a0a;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;

        .nav-link {

        }
        
        .nav-link:hover {

        }

        .hero-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=2070&amp;q=80');

            background-position: center;
            background-attachment: fixed;
        }

        .section-header {
            font-size: 2.75rem;
            line-height: 1.1;
            font-weight: 700;
        }

        .fitness-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .fitness-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .nav-active {
            color: #22c55e;
            font-weight: 600;
        }

</head>
